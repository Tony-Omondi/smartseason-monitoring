server {
    listen 80;
    server_name nitotoken.cyou www.nitotoken.cyou;

    # Allow Certbot to authenticate via this directory
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force redirect to HTTPS (Uncomment this AFTER you get the SSL cert)
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    # TEMPORARY: Serve frontend on HTTP so we can test before SSL
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

